<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="VitaLog - Suivi santé personnel">
<title>VitaLog</title>
<link rel="icon" type="image/png" href="android-chrome-192x192.png">
<link rel="apple-touch-icon" href="android-chrome-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d1a;--surface:#0f1628;--surface2:#161e35;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--cal:#ff6b35;--cal-soft:rgba(255,107,53,0.15);--water:#38bdf8;--water-soft:rgba(56,189,248,0.15);--sport:#a78bfa;--sport-soft:rgba(167,139,250,0.15);--steps:#34d399;--steps-soft:rgba(52,211,153,0.15);--prot:#f59e0b;--carb:#6366f1;--fat:#ec4899;--fiber:#10b981;--radius:16px;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);overscroll-behavior:none}
body{overflow:hidden}
#app{width:100%;height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
.screen.active{display:flex;flex-direction:column}
.screen::-webkit-scrollbar{display:none}
.topbar{position:sticky;top:0;z-index:50;padding:48px 20px 16px;background:linear-gradient(180deg,var(--bg) 60%,transparent);display:flex;align-items:flex-end;justify-content:space-between}
.topbar-title{font-size:26px;font-weight:800;letter-spacing:-0.5px}
.topbar-sub{font-size:13px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.topbar-date{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:20px}
.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--muted);transition:color .2s;font-family:var(--sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-btn.active{color:#e8eaf0}
.bilan-card{margin:0 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.bilan-ring-wrap{position:relative;width:160px;height:160px}
.bilan-ring-wrap svg{transform:rotate(-90deg)}
.bilan-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.bilan-kcal{font-family:var(--mono);font-size:28px;font-weight:500}
.bilan-formula{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.8}
.bilan-formula span{color:var(--text)}
.rings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 12px}
.ring-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.ring-wrap{position:relative;width:90px;height:90px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--mono);font-size:16px;font-weight:500}
.ring-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.ring-values{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.6}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin:0 16px 12px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}

/* WEEKLY CHART AMÉLIORÉ */
.week-chart-wrap{position:relative;margin-top:8px}
.week-chart{display:flex;align-items:flex-end;gap:6px;height:180px;position:relative;padding-bottom:32px}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;height:100%}
.week-bars{flex:1;width:100%;display:flex;align-items:flex-end;gap:2px;position:relative}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.week-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;position:relative;overflow:hidden}
.week-bar-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%) rotate(-90deg);transform-origin:center;font-family:var(--mono);font-size:8px;white-space:nowrap;color:rgba(255,255,255,0.85);font-weight:500;pointer-events:none}
.week-day-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;font-weight:500;height:14px;text-align:center;width:100%}
.week-day.today .week-day-label{color:var(--text);font-weight:700}
.goal-line{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(255,107,53,0.6);z-index:10;pointer-events:none}
.goal-line-label{position:absolute;right:0;font-family:var(--mono);font-size:8px;color:var(--cal);transform:translateY(-11px);background:var(--surface);padding:0 2px}
.week-legend{display:flex;gap:12px;margin-bottom:10px;font-family:var(--mono);font-size:10px;flex-wrap:wrap}
.week-legend-item{display:flex;align-items:center;gap:4px}
.week-legend-dot{width:8px;height:8px;border-radius:2px}

.macro-row{margin-bottom:12px}
.macro-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.macro-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.entry-list{display:flex;flex-direction:column;gap:8px}
.entry-item{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.entry-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-val{font-family:var(--mono);font-size:13px;font-weight:500;white-space:nowrap}
.entry-del{background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);opacity:.5;font-size:14px}
.type-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.type-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.type-btn .emoji{font-size:22px}
.type-btn[data-t=food].selected{color:var(--cal);background:var(--cal-soft);border-color:var(--cal)}
.type-btn[data-t=sport].selected{color:var(--sport);background:var(--sport-soft);border-color:var(--sport)}
.type-btn[data-t=water].selected{color:var(--water);background:var(--water-soft);border-color:var(--water)}
.type-btn[data-t=steps].selected{color:var(--steps);background:var(--steps-soft);border-color:var(--steps)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#5b8cff,#a78bfa);color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;margin-top:6px}
.btn-submit:active{opacity:.85;transform:scale(.98)}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.quick-btn{padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-align:center;font-family:var(--sans);font-size:11px;color:var(--muted)}
.quick-btn .q-name{font-weight:600;color:var(--text);font-size:12px}
.quick-btn .q-cal{font-family:var(--mono);font-size:10px}
.goal-item{display:flex;align-items:center;gap:14px;background:var(--surface2);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.goal-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.goal-info{flex:1}
.goal-label{font-size:13px;font-weight:700}
.goal-current{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.goal-input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:14px;width:100px;text-align:center;outline:none}

/* CALENDRIER */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:8px 16px;cursor:pointer;font-family:var(--sans);font-weight:700;font-size:14px}
.cal-month{font-size:16px;font-weight:800}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;border:1px solid transparent}
.cal-day-num{font-family:var(--mono);font-size:13px;font-weight:500}
.cal-day-dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.cal-day.has-data{background:var(--surface2);border-color:var(--border)}
.cal-day.today{border-color:var(--cal)!important;background:var(--cal-soft)!important}
.cal-day.empty{opacity:0;pointer-events:none}

/* MODAL JOUR */
.day-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.day-modal-overlay.open{opacity:1;pointer-events:all}
.day-modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:560px;padding:24px 20px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);border:1px solid var(--border);border-bottom:none;max-height:85vh;overflow-y:auto}
.day-modal-overlay.open .day-modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}

/* ANNEAU MODAL */
.modal-bilan{display:flex;align-items:center;gap:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.modal-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.modal-ring-wrap svg{transform:rotate(-90deg)}
.modal-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.modal-ring-val{font-family:var(--mono);font-size:14px;font-weight:500}
.modal-bilan-details{flex:1}
.modal-bilan-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;margin-bottom:4px}
.modal-bilan-row span:first-child{color:var(--muted)}

.hist-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.hist-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-row-icon{font-size:15px;width:22px;text-align:center}
.hist-row-label{flex:1;font-size:13px;color:var(--muted)}
.hist-row-val{font-family:var(--mono);font-size:13px;font-weight:500}

.section-header{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:4px 16px 8px;margin-top:8px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:16px 0}
.info-box{background:var(--steps-soft);border:1px solid var(--steps);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--steps);font-family:var(--mono)}
.c-cal{color:var(--cal)}.c-water{color:var(--water)}.c-sport{color:var(--sport)}.c-steps{color:var(--steps)}

/* FAV FORM MACROS */
.fav-macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
</style>
</head>
<body>
<div id="app">

  <!-- DASHBOARD -->
  <div class="screen active" id="screen-dashboard">
    <div class="topbar">
      <div><div class="topbar-title">VitaLog 🔥</div><div class="topbar-sub" id="greet"></div></div>
      <div class="topbar-date" id="today-label"></div>
    </div>
    <div class="bilan-card" id="bilan-card"></div>
    <div class="section-header">Détail du jour</div>
    <div class="rings-grid" id="rings-container"></div>
    <div class="card"><div class="card-title">Macronutriments du jour</div><div id="macros-block"></div></div>
    <div class="card">
      <div class="card-title">7 derniers jours</div>
      <div class="week-legend">
        <div class="week-legend-item"><div class="week-legend-dot" style="background:#4ade80"></div><span style="color:var(--muted)">Bilan net</span></div>
        <div class="week-legend-item"><div class="week-legend-dot" style="background:var(--cal)"></div><span style="color:var(--muted)">Ingérées</span></div>
        <div class="week-legend-item"><div class="week-legend-dot" style="background:var(--sport)"></div><span style="color:var(--muted)">Dépensées</span></div>
      </div>
      <div class="week-chart-wrap"><div class="week-chart" id="weekly-bars"></div></div>
    </div>
    <div class="section-header">Entrées du jour</div>
    <div style="padding:0 16px 8px" id="today-entries-preview"></div>
  </div>

  <!-- AJOUTER -->
  <div class="screen" id="screen-add">
    <div class="topbar"><div><div class="topbar-title">Ajouter</div><div class="topbar-sub">Enregistrer une entrée</div></div></div>
    <div style="padding:0 16px">
      <div class="card-title" style="margin:0 0 10px">Type d'entrée</div>
      <div class="type-selector" id="add-type-selector">
        <button class="type-btn selected" data-t="food"><span class="emoji">🍽️</span>Aliment</button>
        <button class="type-btn" data-t="sport"><span class="emoji">🏃</span>Sport</button>
        <button class="type-btn" data-t="water"><span class="emoji">💧</span>Eau</button>
        <button class="type-btn" data-t="steps"><span class="emoji">👟</span>Pas</button>
      </div>
      <div id="form-food">
        <div class="card-title" style="margin:0 0 10px">Raccourcis</div>
        <div class="quick-grid" id="quick-foods"></div>
        <div class="form-group"><label class="form-label">Aliment / Repas</label><input class="form-input" id="food-name" placeholder="Ex: Salade Caesar" type="text" autocomplete="off"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Calories (kcal)</label><input class="form-input" id="food-cal" placeholder="350" type="number" inputmode="numeric"></div>
          <div class="form-group"><label class="form-label">Heure</label><input class="form-input" id="food-time" type="time"></div>
        </div>
        <div class="divider"></div>
        <div class="card-title" style="margin:0 0 10px">Macronutriments (optionnel)</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label" style="color:var(--prot)">💪 Protéines (g)</label><input class="form-input" id="food-prot" placeholder="0" type="number" inputmode="numeric"></div>
          <div class="form-group"><label class="form-label" style="color:var(--carb)">🌾 Glucides (g)</label><input class="form-input" id="food-carb" placeholder="0" type="number" inputmode="numeric"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label" style="color:var(--fat)">🫒 Lipides (g)</label><input class="form-input" id="food-fat" placeholder="0" type="number" inputmode="numeric"></div>
          <div class="form-group"><label class="form-label" style="color:var(--fiber)">🥦 Fibres (g)</label><input class="form-input" id="food-fiber" placeholder="0" type="number" inputmode="numeric"></div>
        </div>
      </div>
      <div id="form-sport" style="display:none">
        <div class="form-group"><label class="form-label">Activité</label><input class="form-input" id="sport-name" placeholder="Ex: Course à pied" type="text" autocomplete="off"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Durée (min)</label><input class="form-input" id="sport-dur" placeholder="30" type="number" inputmode="numeric"></div>
          <div class="form-group"><label class="form-label">Calories brûlées</label><input class="form-input" id="sport-cal" placeholder="200" type="number" inputmode="numeric"></div>
        </div>
      </div>
      <div id="form-water" style="display:none">
        <div class="card-title" style="margin:0 0 10px">Quantité rapide</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
          <button class="quick-btn" onclick="setWater(150)"><div class="q-name">☕</div><div class="q-cal">150 ml</div></button>
          <button class="quick-btn" onclick="setWater(250)"><div class="q-name">🥤</div><div class="q-cal">250 ml</div></button>
          <button class="quick-btn" onclick="setWater(330)"><div class="q-name">🍶</div><div class="q-cal">330 ml</div></button>
          <button class="quick-btn" onclick="setWater(500)"><div class="q-name">🍼</div><div class="q-cal">500 ml</div></button>
        </div>
        <div class="form-group"><label class="form-label">Volume (ml)</label><input class="form-input" id="water-ml" placeholder="250" type="number" inputmode="numeric"></div>
      </div>
      <div id="form-steps" style="display:none">
        <div class="info-box" id="steps-cal-preview">👟 Calories calculées automatiquement selon ton poids</div>
        <div class="form-group"><label class="form-label">Nombre de pas</label><input class="form-input" id="steps-count" placeholder="8000" type="number" inputmode="numeric" oninput="updateStepsPreview()"></div>
        <div class="form-group"><label class="form-label">Distance (km, optionnel)</label><input class="form-input" id="steps-km" placeholder="6.0" type="number" inputmode="decimal"></div>
      </div>
      <button class="btn-submit" onclick="submitEntry()">Enregistrer ✓</button>
    </div>
  </div>

  <!-- CALENDRIER -->
  <div class="screen" id="screen-history">
    <div class="topbar"><div><div class="topbar-title">Historiq
